name: Auto Update Lists
on:
  schedule:
    - cron: '0 3 * * *' # Каждую ночь в 03:00
  workflow_dispatch: # Позволяет запускать обновление вручную из интерфейса GitHub

jobs:
  update-lists:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешаем боту делать коммиты
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Domain Lists and Hosts Template
        run: |
          mkdir -p lists
          
          # 1. Загружаем списки dns.malw.link
          echo "Fetching dns.malw.link lists..."
          curl -sL https://raw.githubusercontent.com/ImMALWARE/dns.malw.link/master/lists/domains.txt > lists/domains.txt
          curl -sL https://raw.githubusercontent.com/ImMALWARE/dns.malw.link/master/lists/domains_with_subdomains.txt > lists/domains_with_subdomains.txt
          touch lists/banned_ips.txt
          
          # 2. Загружаем hosts от GeoHide и вытаскиваем уникальные домены
          echo "Fetching GeoHide lists..."
          curl -sL https://raw.githubusercontent.com/Internet-Helper/GeoHideDNS/main/hosts/hosts > geohide.tmp
          
          # Очищаем от дубликатов. Если домен уже есть в domains.txt, мы его не добавляем в custom.txt
          awk '/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/ && $1 != "0.0.0.0" {print $2}' geohide.tmp | sort -u > all_geohide.tmp
          awk 'NR==FNR{seen[$1]=1; next} !seen[$1]' lists/domains.txt all_geohide.tmp > lists/custom.txt
          
          # 3. Генерируем шаблон hosts файла (без дублирующихся доменов)
          echo "Generating hosts template..."
          curl -sL https://raw.githubusercontent.com/ImMALWARE/dns.malw.link/master/hosts > malw.tmp
          
          awk '
            # Игнорируем стандартные системные записи из чужих файлов, чтобы не сломать локалхост
            $2 ~ /^(localhost|ip6-localhost|ip6-loopback|ip6-allnodes|ip6-allrouters|broadcasthost|local)$/ { next }
            /^::1/ { next }
            
            # Если строка содержит IP и это не 0.0.0.0 (то есть полезный домен)
            /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/ && $1 != "0.0.0.0" {
              domain=$2
              if (!seen_domain[domain]) {
                seen_domain[domain]=1
                print "YOUR_VPS_IP " domain
              }
              next
            }
            # Если это комментарий, пустая строка или блокировка 0.0.0.0
            { print $0 }
          ' malw.tmp geohide.tmp > mega_hosts_template.txt
          
          # 4. Добавляем GitHub домены принудительно (для обхода блокировок raw.githubusercontent.com)
          for gh_domain in "raw.githubusercontent.com" "release-assets.githubusercontent.com" "private-user-images.githubusercontent.com" "gist.githubusercontent.com" "avatars.githubusercontent.com"; do
            echo "$gh_domain" >> lists/custom.txt
            echo "YOUR_VPS_IP $gh_domain" >> mega_hosts_template.txt
          done
          
          rm *.tmp
          
      - name: Check for changes and commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add lists/ mega_hosts_template.txt
          
          if git diff-index --quiet HEAD; then
            echo "No changes in lists. Skipping commit."
          else
            echo "Changes detected. Committing and pushing."
            git commit -m "chore: auto-update domains and hosts template"
            git push
          fi
